<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Throttle — first-run onboarding</title>
  <link rel="stylesheet" href="throttle.css" />
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="onboarding-data.js"></script>

  <script type="text/babel">
/* Throttle — onboarding bundle (inline single Babel script) */

/* ===================== onboarding-components.jsx ===================== */
/* Throttle — onboarding shared primitives (exported to window) */
const { useState: useStateOb } = React;
const OB = window.ThrottleOnb;

/* ---------- icons ---------- */
function ObIcon({ n, className, style }) {
  const p = {
    gauge: <><path d="M12 21a9 9 0 1 1 9-9" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M12 12l5.2-3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><circle cx="12" cy="12" r="1.7" fill="currentColor"/></>,
    lock: <><rect x="5" y="10.5" width="14" height="9" rx="2" stroke="currentColor" strokeWidth="1.6"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5" stroke="currentColor" strokeWidth="1.6"/></>,
    check: <path d="M5 12.5l4.2 4.2L19 7" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>,
    spark: <><path d="M12 3.5l1.7 4.4 4.4 1.7-4.4 1.7L12 15.7l-1.7-4.4L5.9 9.6l4.4-1.7L12 3.5Z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></>,
  }[n];
  return <svg className={className} style={style} viewBox="0 0 24 24" fill="none" aria-hidden="true">{p}</svg>;
}

/* ---------- brand lockup ---------- */
function BrandHero({ compact }) {
  return (
    <div className={"ob-hero" + (compact ? " compact" : "")}>
      <ObIcon n="gauge" className="ob-mark" />
      <div className="ob-word">Throttle</div>
      <div className="ob-what">{compact ? OB.COPY.whatShort : OB.COPY.what}</div>
    </div>
  );
}

/* ---------- privacy line ---------- */
function PrivacyLine({ long, inline }) {
  return (
    <div className={"ob-priv" + (inline ? " inline" : "")}>
      <ObIcon n="lock" className="lk" />
      {long ? (
        <div className="pt">Throttle reads <code>~/.claude/projects</code> locally. <b>Nothing leaves this Mac</b> — unless you turn on Exact mode (Pro), and even then only Safari talks to claude.ai.</div>
      ) : (
        <div className="pt">Reads <code>~/.claude/projects</code> on this Mac. <b>Nothing leaves it.</b></div>
      )}
    </div>
  );
}

/* ---------- toggle ---------- */
function ObToggle({ on, setOn }) {
  return (
    <button className="ob-sw" data-on={!!on} onClick={() => setOn(!on)} aria-pressed={!!on}><span className="knob" /></button>
  );
}
function LaunchRow({ on, setOn }) {
  return (
    <div className="ob-toggle-row">
      <div className="rl"><div className="t">Launch at login</div><div className="s">Keep the meter in your menu bar.</div></div>
      <ObToggle on={on} setOn={setOn} />
    </div>
  );
}

/* ---------- exact teaser ---------- */
function ExactTeaser() {
  return (
    <div className="ob-teaser">
      <ObIcon n="spark" className="sp" />
      <span>Want server-true numbers? Turn on <b>Exact mode</b> later in Settings.</span>
    </div>
  );
}

/* ---------- plan picker ---------- */
function PlanPicker({ pick, setPick }) {
  return (
    <div className="plans">
      {OB.PLANS.map((p) => {
        const on = pick === p.id;
        const isSkip = p.id === "skip";
        return (
          <button key={p.id} className={"plan" + (isSkip ? " skip" : "")} data-on={on} onClick={() => setPick(p.id)}>
            <span className="radio"><ObIcon n="check" /></span>
            <span className="pmain">
              <span className="pname">{p.name}{p.price && <span className="pprice">{p.price}</span>}</span>
              <span className="pblurb">{p.blurb}</span>
            </span>
            {!isSkip && (
              <span className="pcaps">
                <span className="cap">{p.session} · {p.weekly}</span>
                <span className="caplab">session · weekly</span>
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

/* plan helper */
function planById(id) { return OB.PLANS.find((p) => p.id === id) || null; }

Object.assign(window, {
  ObIcon, BrandHero, PrivacyLine, ObToggle, LaunchRow, ExactTeaser, PlanPicker, planById,
});

/* ===================== onboarding-directions.jsx ===================== */
/* Throttle — onboarding: 3 flow directions + comparison app */
const { useState: useStateD, useEffect: useEffectD } = React;
const OBD = window.ThrottleOnb;

/* ============================================================
   DIR A — Classic 3-step wizard
   ============================================================ */
function WizardOnb({ moment }) {
  const [step, setStep] = useStateD(moment.step);
  const [pick, setPick] = useStateD(moment.pick);
  const [launch, setLaunch] = useStateD(true);
  useEffectD(() => { setStep(moment.step); setPick(moment.pick); }, [moment.key]);

  const steps = ["Welcome", "Your plan", "Ready"];
  const p = planById(pick);
  const canNext = step !== 1 || pick != null;

  return (
    <div className="pop OB">
      <div className="wz-dots">
        {steps.map((s, i) => <span key={i} className="wz-dot" data-on={i === step} />)}
      </div>
      <div className="wz-step-name">{`Step ${step + 1} of 3 · ${steps[step]}`}</div>

      <div className="wz-pane">
        {step === 0 && (
          <div className="grow">
            <BrandHero />
            <PrivacyLine long />
          </div>
        )}
        {step === 1 && (
          <div className="grow">
            <div className="ob-gl"><div className="t">{OBD.COPY.planPrompt}</div><div className="s">{OBD.COPY.planSub}</div></div>
            <PlanPicker pick={pick} setPick={setPick} />
            <div className="sep" style={{ margin: "6px 16px" }} />
            <LaunchRow on={launch} setOn={setLaunch} />
          </div>
        )}
        {step === 2 && (
          <div className="grow">
            <div className="ob-gl"><div className="t">You're set</div><div className="s">Throttle will write these caps and start tracking.</div></div>
            <div className="wz-summary">
              <div className="sum-row">
                <span className="sk">Plan</span>
                <span className="sv tag">{p ? p.name : "Auto-calibrate"}</span>
              </div>
              <div className="sum-row">
                <span className="sk">Session cap</span>
                {p && p.session ? <span className="sum-caps"><span className="sv">{p.session}</span><span className="sub">5-hour</span></span> : <span className="sv tag">learns from usage</span>}
              </div>
              <div className="sum-row">
                <span className="sk">Weekly cap</span>
                {p && p.weekly ? <span className="sum-caps"><span className="sv">{p.weekly}</span><span className="sub">all models</span></span> : <span className="sv tag">learns from usage</span>}
              </div>
              <div className="sum-row">
                <span className="sk">Launch at login</span>
                <span className="sv tag" style={{ color: launch ? "var(--accent)" : "var(--ink-2)" }}>{launch ? "On" : "Off"}</span>
              </div>
            </div>
            <ExactTeaser />
          </div>
        )}
      </div>

      <div className="sep" style={{ margin: 0 }} />
      <div className="ob-actions">
        {step > 0 ? <button className="ob-btn text" onClick={() => setStep(step - 1)}>Back</button> : <span className="spacer" />}
        {step > 0 && <span className="spacer" />}
        {step < 2
          ? <button className="ob-btn" style={{ opacity: canNext ? 1 : 0.4, pointerEvents: canNext ? "auto" : "none" }} onClick={() => setStep(step + 1)}>{step === 0 ? "Get started" : "Continue"}</button>
          : <button className="ob-btn">Open my meter</button>}
      </div>
    </div>
  );
}

/* ============================================================
   DIR B — Single calm screen
   ============================================================ */
function SingleOnb({ moment }) {
  const [pick, setPick] = useStateD(moment.pick);
  const [launch, setLaunch] = useStateD(true);
  useEffectD(() => { setPick(moment.pick); }, [moment.key]);

  return (
    <div className="pop OB SB-ob">
      <BrandHero compact />
      <PrivacyLine long />
      <div className="sep" />
      <div className="ob-gl"><div className="t">{OBD.COPY.planPrompt}</div><div className="s">{OBD.COPY.planSub}</div></div>
      <PlanPicker pick={pick} setPick={setPick} />
      <div className="sep" />
      <LaunchRow on={launch} setOn={setLaunch} />
      <div className="sep" />
      <ExactTeaser />
      <div className="ob-actions">
        <button className="ob-btn block" style={{ opacity: pick ? 1 : 0.4, pointerEvents: pick ? "auto" : "none" }}>
          {pick === "skip" ? "Get started — auto-calibrate" : "Get started"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   DIR C — The Living Meter
   ============================================================ */
function LivingMeterRow({ name, sub, cap, pct, auto, filled }) {
  return (
    <div className="lm-row">
      <div className="lm-top">
        <span className="lm-name">{name}<span className="sub">{sub}</span></span>
        {filled
          ? (auto ? <span className="lm-cap"><span className="ghost">auto</span></span> : <span className="lm-cap">cap {cap}</span>)
          : <span className="lm-cap"><span className="ghost">— —</span></span>}
      </div>
      <div className="lm-bar">
        <span className={"lm-fill" + (auto ? " auto" : "")} style={{ width: filled ? (auto ? 100 : pct) + "%" : "0%" }} />
      </div>
    </div>
  );
}

function LivingMeterOnb({ moment }) {
  // qi: 0 = ask plan, 1 = ask launch, 2 = done
  const initialQi = moment.step === 0 ? 0 : moment.step === 2 ? 2 : 1;
  const [qi, setQi] = useStateD(initialQi);
  const [pick, setPick] = useStateD(moment.pick);
  const [launch, setLaunch] = useStateD(true);
  useEffectD(() => { setQi(moment.step === 0 ? 0 : moment.step === 2 ? 2 : 1); setPick(moment.pick); }, [moment.key]);

  const p = planById(pick);
  const filled = pick != null;
  const auto = pick === "skip";
  const D = OBD.DEMO_FILL;

  function choosePlan(id) { setPick(id); setQi(1); }

  return (
    <div className="pop OB">
      <BrandHero compact />

      {/* live preview of the real meter */}
      <div className="lm-stage" data-filled={filled}>
        <span className="lm-cap-label">Your meter</span>
        <div className="lm-head">
          <ObIcon n="gauge" className="m" />
          <span className="w">Throttle</span>
          {filled && !auto && <span className="pill pro" style={{ marginLeft: "auto" }}>Pro</span>}
          {auto && <span className="pill free" style={{ marginLeft: "auto" }}>Auto</span>}
        </div>
        <LivingMeterRow name="Session" sub="5-hour" cap={p && p.session} pct={D.session} auto={auto} filled={filled} />
        <LivingMeterRow name="Weekly" sub="all models" cap={p && p.weekly} pct={D.weekly} auto={auto} filled={filled} />
        <LivingMeterRow name="Weekly" sub="Sonnet only" cap={p && p.weekly} pct={D.sonnet} auto={auto} filled={filled} />
      </div>

      <div className="lm-progress">
        {[0, 1, 2].map((i) => <span key={i} className="lm-pdot" data-on={qi >= i} />)}
      </div>

      {/* confirmed answers collapse to compact rows */}
      <div className="thread">
        {qi >= 1 && (
          <div className="confirmed" onClick={() => setQi(0)}>
            <span className="ck"><ObIcon n="check" /></span>
            <span className="cq">Plan</span>
            <span className="ca">{p ? p.name : "Auto-calibrate"}{p && p.session && <> · <span className="num">{p.session}</span>/<span className="num">{p.weekly}</span></>}</span>
            <span className="edit">Edit</span>
          </div>
        )}

        {qi === 0 && (
          <>
            <div className="q-card"><div className="q-prompt">{OBD.COPY.planPrompt}</div><div className="q-sub">Pick one and watch your meter fill in. {OBD.COPY.privacyShort}</div></div>
            <PlanPicker pick={pick} setPick={choosePlan} />
          </>
        )}

        {qi === 1 && (
          <>
            <div className="q-card"><div className="q-prompt">Keep Throttle in your menu bar?</div><div className="q-sub">Launch it automatically when you log in.</div></div>
            <LaunchRow on={launch} setOn={setLaunch} />
            <div className="ob-actions">
              <button className="ob-btn block" onClick={() => setQi(2)}>Looks good →</button>
            </div>
          </>
        )}

        {qi === 2 && (
          <>
            <div className="confirmed" onClick={() => setQi(1)}>
              <span className="ck"><ObIcon n="check" /></span>
              <span className="cq">Launch at login</span>
              <span className="ca" style={{ color: launch ? "var(--accent)" : "var(--ink-2)" }}>{launch ? "On" : "Off"}</span>
              <span className="edit">Edit</span>
            </div>
            <ExactTeaser />
            <div className="ob-actions">
              <button className="ob-btn block">Open my meter</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   Comparison page
   ============================================================ */
const OB_DIRS = [
  {
    id: "A", comp: "WizardOnb", kicker: "Direction A", name: "The Three-Step Wizard",
    idea: "Welcome → Your plan → Ready, as three discrete paged panes with progress dots and Back / Continue / Open my meter. The familiar setup contract.",
    spec: [
      ["Signature", "Progress dots + a single forward button — there's exactly one thing to do on each pane."],
      ["Optimizes", "Zero overwhelm; each decision is isolated and a confirm screen builds trust before writing caps."],
      ["Trades off", "Three taps to finish, and the privacy line is gone by the time you pick a plan."],
    ],
  },
  {
    id: "B", comp: "SingleOnb", kicker: "Direction B", name: "The One-Breath Screen",
    idea: "Everything on a single calm surface — welcome, privacy, the plan picker, the login toggle, one Get Started. No paging, no Back, nothing hidden.",
    spec: [
      ["Signature", "The entire contract is visible at once; privacy and the one real choice share the same glance."],
      ["Optimizes", "Speed and candor — an impatient developer is done in one decision and one click."],
      ["Trades off", "Denser surface; no forced confirm beat before caps are written."],
    ],
  },
  {
    id: "C", comp: "LivingMeterOnb", kicker: "Direction C", name: "The Living Meter",
    idea: "The real meter sits at the top, empty and ghosted, and assembles itself as you answer. Pick a plan and the caps + bars populate live; each answer collapses to a confirmed row.",
    spec: [
      ["Signature", "Onboarding IS the product — your choice writes into a working meter you can already see filling in."],
      ["Optimizes", "Instant tangibility and trust; the payoff is shown, not promised, before you commit."],
      ["Trades off", "The most novel/unfamiliar pattern, and the preview costs vertical room up top."],
    ],
  },
];

function ObCard({ theme, comp, moment }) {
  const Comp = window[comp];
  return (
    <div>
      <div className="theme-tag">{theme === "theme-light" ? "Light" : "Dark"}</div>
      <div className={"pop-frame " + theme}>
        <div className="pop-caret" />
        <Comp moment={moment} />
      </div>
    </div>
  );
}

function ObColumn({ dir, moment }) {
  return (
    <div className="column">
      <div className="col-head">
        <div className="col-kicker">{dir.kicker}</div>
        <div className="col-name">{dir.name}</div>
        <div className="col-idea">{dir.idea}</div>
        <div className="spec">
          {dir.spec.map(([k, v]) => (
            <div className="row" key={k}><span className="k">{k}</span><span className="v">{v}</span></div>
          ))}
        </div>
      </div>
      <div className="theme-stack">
        <ObCard theme="theme-light" comp={dir.comp} moment={moment} />
        <ObCard theme="theme-dark" comp={dir.comp} moment={moment} />
      </div>
    </div>
  );
}

function OnboardingApp() {
  const [mKey, setMKey] = useStateD("welcome");
  const moment = OBD.MOMENTS.find((m) => m.key === mKey);
  return (
    <div className="page">
      <div className="masthead">
        <h1>Throttle — first-run onboarding</h1>
        <p>
          The first click on the menu-bar icon. The job is narrow: take a developer from "just installed" to a working,
          calibrated meter in seconds — earning privacy-first trust without friction. Three flow models that differ on
          how you move through it, not on colour. The plan picker pre-fills real caps (shown in mono); accent appears
          only on the chosen plan, the toggle and the primary button. Switch the moment below; both themes are shown.
        </p>
      </div>
      <div className="controls">
        <span className="ctl-label">Moment</span>
        <div className="segmented">
          {OBD.MOMENTS.map((m) => (
            <button key={m.key} data-on={mKey === m.key} onClick={() => setMKey(m.key)}>{m.label}</button>
          ))}
        </div>
        <span className="ctl-label" style={{ marginLeft: "auto", textTransform: "none", letterSpacing: 0, fontWeight: 500, color: "var(--ink-3, #888)" }}>Each flow is fully clickable — try the pickers and toggles.</span>
      </div>
      <div className="grid stats-grid">
        {OB_DIRS.map((d) => <ObColumn key={d.id} dir={d} moment={moment} />)}
      </div>
    </div>
  );
}

function mountOnb() {
  const ready = window.WizardOnb && window.SingleOnb && window.LivingMeterOnb && window.PlanPicker && window.BrandHero;
  if (!ready) { setTimeout(mountOnb, 12); return; }
  ReactDOM.createRoot(document.getElementById("root")).render(<OnboardingApp />);
}

window.WizardOnb = WizardOnb; window.SingleOnb = SingleOnb; window.LivingMeterOnb = LivingMeterOnb;
mountOnb();

  </script>
</body>
</html>
