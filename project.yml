name: Throttle
options:
  bundleIdPrefix: com.lorislab
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: TDV6D5L785
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"

targets:
  Throttle:
    type: application
    platform: macOS
    sources:
      - path: Throttle
    resources:
      - path: Throttle/Resources
    info:
      path: Throttle/Info.plist
      properties:
        LSUIElement: YES
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 LorisLabs. All rights reserved."
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle
        PRODUCT_NAME: Throttle
    dependencies:
      - package: GRDB

  ThrottleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ThrottleTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Throttle.app/Contents/MacOS/Throttle
    dependencies:
      - target: Throttle
      - package: GRDB
