name: Throttle
options:
  bundleIdPrefix: com.lorislab
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  knownRegions:
    - en
    - fr
    - Base

settings:
  base:
    DEVELOPMENT_TEAM: TDV6D5L785
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "3.2.71"
    CURRENT_PROJECT_VERSION: "171"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
  configs:
    # Hardened runtime is required for notarized Release distribution but
    # interferes with Debug-build behaviours (debuggers, dynamic library
    # loading paths, RealityBridge shader preloading on macOS 26+). Keep it
    # off in Debug, on in Release.
    Release:
      ENABLE_HARDENED_RUNTIME: YES

packages:
  ThrottleShared:
    path: ThrottleShared
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.14.0"   # 1.14 parser fixes; bumped chasing macOS 27 beta ANSI mis-render

targets:
  Throttle:
    type: application
    platform: macOS
    sources:
      - path: Throttle
      # Bundled so SessionOffloadSheet can emit a self-contained deploy script.
      # Must live under `sources` with an explicit resources buildPhase — a target
      # `resources:` key is NOT valid XcodeGen and was silently dropped, which is
      # why 3.2.58 shipped the "// throttle-agent.mjs missing from bundle" placeholder.
      - path: edge-agent/throttle-agent.mjs
        buildPhase: resources
    info:
      path: Throttle/Info.plist
      properties:
        LSUIElement: YES
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 LorisLabs. All rights reserved."
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.lorislab.throttle.activate
            CFBundleURLSchemes:
              - throttle
        # The Session Offload edge agent is reached over plain HTTP at a
        # user-configured LAN/Tailscale address (its own bearer token + Tailscale is
        # the security boundary, not TLS). ATS blocks cleartext by default, which is
        # why Verify failed with "requires a secure connection". Allow it — the host
        # is arbitrary user input so a domain exception can't be pinned; Throttle is
        # Developer-ID (not App Store), so NSAllowsArbitraryLoads is acceptable here.
        # ⚠️ Do NOT add NSAllowsLocalNetworking alongside: when both are present the
        # OS IGNORES NSAllowsArbitraryLoads (documented ATS precedence), and Tailscale
        # 100.64/10 CGNAT is not "local" — that combo re-broke Verify in 3.2.61.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSAppleEventsUsageDescription: "Throttle uses Safari to fetch your claude.ai usage page so it can show the same numbers Anthropic shows you. It only reads /api/organizations/.../usage — never your messages."
        NSCalendarsFullAccessUsageDescription: "Throttle adds a one-time reminder to your default calendar when your weekly Claude limit is about to reset. Optional — only when you tap the Calendar button."
        NSCalendarsUsageDescription: "Throttle adds a one-time reminder to your default calendar when your weekly Claude limit is about to reset. Optional — only when you tap the Calendar button."
        NSUserNotificationsUsageDescription: "Throttle banners you when your Claude usage crosses 80% or 95%."
        SUFeedURL: "https://lorislab.fr/throttle/appcast.xml"
        SUPublicEDKey: "Xlig8/F7qhCaZlsYiI8MIeHpz1lVpZaZIgeGK45J7O4="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle
        PRODUCT_NAME: Throttle
        CODE_SIGN_ENTITLEMENTS: Throttle/Throttle.entitlements
        # Manual Developer ID signing: the CloudKit entitlement forces an embedded
        # provisioning profile, which automatic signing can't mint without an Apple
        # ID in Xcode. We provision the profile out-of-band via the ASC API and pin
        # it here. Profile: "Throttle DevID iCloud" (bundle com.lorislab.throttle).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "Throttle DevID iCloud"
    dependencies:
      - package: GRDB
      - package: Sparkle
      - package: SwiftTerm
      - package: ThrottleShared
      - package: ThrottleShared
        product: ThrottlePeer
      - target: ThrottleWidget

  ThrottleWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: ThrottleWidget
    info:
      path: ThrottleWidget/Info.plist
      properties:
        CFBundleDisplayName: Throttle
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.widget
        PRODUCT_NAME: ThrottleWidget
        CODE_SIGN_ENTITLEMENTS: ThrottleWidget/ThrottleWidget.entitlements
        SKIP_INSTALL: YES
        # Manual signing (see Throttle target). The parent app is manually signed
        # for CloudKit, so the embedded widget must be too — same Developer ID cert.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: "Throttle Widget DevID"

  # ─── iOS companion (App Store) ───────────────────────────────────────────
  # Live mirror of the Mac's usage/cockpit state via the user's private CloudKit
  # DB + a LAN fast path. Min iOS 17. Deliberate, gated pivot beyond measure-only:
  # a PAIRED phone can drive a session already running on the Mac (remote terminal)
  # over the authenticated TLS-PSK peer link — never an unauthenticated control path.
  ThrottleiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ThrottleiOS
    info:
      path: ThrottleiOS/Info.plist
      properties:
        CFBundleDisplayName: Throttle
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        # LAN mirror fast path: discover + connect to the Mac over Bonjour. Without
        # both keys iOS silently blocks local-network discovery.
        NSLocalNetworkUsageDescription: "Throttle mirrors your Mac's live Claude Code usage over your local network for instant updates when both devices are on the same Wi-Fi. It falls back to iCloud otherwise."
        NSBonjourServices:
          - _throttle._tcp
        # Face ID gates typing into a remote session. Without this key
        # LAContext.evaluatePolicy is a deterministic crash on Face ID devices.
        NSFaceIDUsageDescription: "Throttle uses Face ID to unlock typing into a remote session, so the write path stays behind your device's biometrics."
        # The edge agent is plain HTTP/ws at a user-configured LAN/Tailscale address
        # (bearer token + Tailscale is the boundary, not TLS). Tailscale's 100.64/10
        # CGNAT range is NOT covered by NSAllowsLocalNetworking, so the whole Edge tab
        # is dead on device without this. Not App Store's favourite, but this app talks
        # only to the user's own box on their own tailnet.
        # ⚠️ NSAllowsLocalNetworking must NOT sit alongside NSAllowsArbitraryLoads —
        # their combo makes the OS ignore ArbitraryLoads (ATS precedence rule).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.ios
        PRODUCT_NAME: Throttle
        CODE_SIGN_ENTITLEMENTS: ThrottleiOS/ThrottleiOS.entitlements
        # iPhone-only v1: portrait phone mirror; iPad multitasking would force
        # all-4 orientations + iPad layouts not designed. Bump to "1,2" later.
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "16"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # Manual signing — no Apple ID in Xcode on the build machine; profiles
        # minted via ASC API (scripts/provision-ios-appstore.mjs), App Store type.
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: TDV6D5L785
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Throttle iOS App Store"
    dependencies:
      - package: ThrottleShared
      - package: ThrottleShared
        product: ThrottlePeer
      - package: SwiftTerm            # remote terminal: render the Mac PTY stream on-device
      - target: ThrottleiOSWidget

  ThrottleiOSWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ThrottleiOSWidget
    info:
      path: ThrottleiOSWidget/Info.plist
      properties:
        CFBundleDisplayName: Throttle
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.ios.widget
        PRODUCT_NAME: ThrottleiOSWidget
        CODE_SIGN_ENTITLEMENTS: ThrottleiOSWidget/ThrottleiOSWidget.entitlements
        SKIP_INSTALL: YES
        # Pin to the iOS app's version — else the appex inherits the project-level
        # Mac version (3.2.52/152) and Apple rejects with ITMS-90473 mismatch.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "16"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: TDV6D5L785
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Throttle iOS Widget App Store"
    dependencies:
      - package: ThrottleShared

  # ─── visionOS spatial cockpit (App Store) ────────────────────────────────
  # Same read-only mirror as the iOS companion, rendered as a spatial cockpit.
  # Reuses ThrottleiOS/Services verbatim (MirrorStore / CloudKitSubscriber /
  # PeerClient / ThresholdNotifier are all platform-agnostic).
  ThrottleVision:
    type: application
    platform: visionOS
    deploymentTarget: "26.0"
    sources:
      - path: ThrottleVision
      - path: ThrottleiOS/Services
      - path: ThrottleiOS/Views/MirrorUI.swift   # shared palette + countdown helper
    info:
      path: ThrottleVision/Info.plist
      properties:
        CFBundleDisplayName: Throttle
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        NSLocalNetworkUsageDescription: "Throttle mirrors your Mac's live Claude Code usage over your local network for instant updates when both devices are on the same Wi-Fi. It falls back to iCloud otherwise."
        NSBonjourServices:
          - _throttle._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.vision
        PRODUCT_NAME: Throttle
        CODE_SIGN_ENTITLEMENTS: ThrottleVision/ThrottleVision.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: ThrottleShared
      - package: ThrottleShared
        product: ThrottlePeer

  ThrottleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ThrottleTests
    resources:
      - path: ThrottleTests/Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lorislab.throttle.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Throttle.app/Contents/MacOS/Throttle
    dependencies:
      - target: Throttle
      # GRDB is linked by the host app (Throttle) and resolved at runtime via
      # BUNDLE_LOADER/TEST_HOST. `link: false` keeps `import GRDB` compiling in the
      # tests WITHOUT embedding a second copy into the .xctest bundle — a duplicate
      # link makes GRDB's thread watchdog spuriously trap "Database was not used on
      # the correct thread" and crashes every DB test suite.
      - package: GRDB
        link: false
