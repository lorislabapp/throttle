name: TestFlight
# iOS builds must be archived with STABLE Xcode (Apple rejects beta-built
# binaries) — this Mac only has Xcode-beta, so CI does the archive+upload.
# Signing: cloud-managed via the ASC API key (CODE_SIGN_STYLE overridden to
# Automatic on the command line; the project's manual iOS profiles are for
# local device runs, and the runner has no Apple Distribution cert).
on:
  workflow_dispatch:
jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Write ExportOptions.plist
        run: |
          mkdir -p build
          cat > build/ExportOptions-iOS-CI.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>method</key><string>app-store-connect</string>
              <key>teamID</key><string>TDV6D5L785</string>
              <key>signingStyle</key><string>automatic</string>
              <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme ThrottleiOS -project Throttle.xcodeproj \
            -archivePath build/ThrottleiOS.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM=TDV6D5L785 \
            PROVISIONING_PROFILE_SPECIFIER= \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ThrottleiOS.xcarchive -exportPath build/export-ios \
            -exportOptionsPlist build/ExportOptions-iOS-CI.plist -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios --file build/export-ios/*.ipa \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" --apiIssuer "${{ secrets.ASC_API_ISSUER_ID }}"
